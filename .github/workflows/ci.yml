name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  quality:
    name: Format, Vet, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        shell: bash
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage profile
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Enforce minimum total coverage
        shell: bash
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          min=70
          echo "Total coverage: ${total}%"
          awk -v total="$total" -v min="$min" 'BEGIN { if (total+0 < min+0) { printf("Coverage %.1f%% is below minimum %.1f%%\n", total, min); exit 1 } }'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage.out
          path: coverage.out
